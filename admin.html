<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eWorldCart – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --surface: #0e1119;
    --card: #13161f;
    --border: #1e2232;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --gold: #f5c842;
    --text: #e8ecf4;
    --muted: #5a637a;
    --danger: #ff4757;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,107,53,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,.03) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none; z-index: 0;
  }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loading-overlay .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent2);
    animation: spin .8s linear infinite;
  }
  .loading-overlay p { color: var(--muted); font-size: .9rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN GATE ── */
  .gate {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; position: relative; z-index: 1;
  }
  .gate-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 48px 40px;
    width: 100%; max-width: 380px;
    box-shadow: 0 40px 80px rgba(0,0,0,.6);
  }
  .gate-logo {
    font-family: var(--font-head); font-size: 1.8rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .gate-sub { color: var(--muted); font-size: .85rem; margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .form-group input {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; color: var(--text); font-size: .95rem;
    font-family: var(--font-body); transition: border-color .2s;
  }
  .form-group input:focus { outline: none; border-color: var(--accent2); }
  .btn-admin-login {
    width: 100%; background: linear-gradient(135deg, var(--accent2), #c0392b);
    color: #fff; border: none; padding: 14px; border-radius: 10px;
    font-weight: 700; font-size: 1rem; cursor: pointer;
    font-family: var(--font-body); margin-top: 8px;
    transition: opacity .2s;
  }
  .btn-admin-login:hover { opacity: .9; }
  .btn-admin-login:disabled { opacity: .5; cursor: not-allowed; }
  .err { background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.3); color: var(--danger); border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-bottom: 14px; display: none; }
  .err.show { display: block; }

  /* ── MAIN LAYOUT ── */
  .admin-wrap { display: none; min-height: 100vh; }
  .admin-wrap.visible { display: flex; flex-direction: column; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(6,8,16,.95); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: var(--font-head); font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--muted); -webkit-text-fill-color: var(--muted); font-size: .75rem; font-weight: 400; margin-left: 8px; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .btn-logout-admin {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 16px; border-radius: 8px;
    cursor: pointer; font-size: .82rem; transition: all .2s;
  }
  .btn-logout-admin:hover { border-color: var(--danger); color: var(--danger); }

  /* Live indicator */
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    display: inline-block; margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: .3; }
  }

  .main { padding: 28px 24px; position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; display: flex; flex-direction: column; gap: 6px;
  }
  .stat-card label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .stat-card .big { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; }
  .stat-card .big.green { color: var(--accent); }
  .stat-card .big.orange { color: var(--accent2); }
  .stat-card .big.gold { color: var(--gold); }

  .section-title {
    font-family: var(--font-head); font-size: 1.1rem; font-weight: 700;
    margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }

  .table-wrap {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; margin-bottom: 28px;
  }
  .table-header {
    display: grid;
    grid-template-columns: 1fr 1.2fr 80px 100px 80px 80px 1fr;
    padding: 14px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    gap: 10px;
  }
  .user-row {
    display: grid;
    grid-template-columns: 1fr 1.2fr 80px 100px 80px 80px 1fr;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    align-items: center; gap: 10px; transition: background .15s;
  }
  .user-row:last-child { border-bottom: none; }
  .user-row:hover { background: rgba(255,255,255,.02); }
  .user-name { font-weight: 600; font-size: .9rem; }
  .user-phone { color: var(--muted); font-size: .82rem; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  }
  .badge.pending { background: rgba(255,107,53,.15); color: var(--accent2); border: 1px solid rgba(255,107,53,.25); }
  .badge.active  { background: rgba(0,212,170,.12);  color: var(--accent);  border: 1px solid rgba(0,212,170,.25); }
  .balance-cell { font-family: var(--font-head); font-size: .95rem; color: var(--gold); font-weight: 700; }

  .amount-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 8px; font-size: .82rem;
    font-family: var(--font-body); cursor: pointer;
  }
  .amount-select:focus { outline: none; border-color: var(--accent); }

  /* Custom balance input */
  .custom-amount {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 8px; font-size: .82rem;
    font-family: var(--font-body); width: 80px;
  }
  .custom-amount:focus { outline: none; border-color: var(--accent); }

  .btn-activate {
    background: linear-gradient(135deg, var(--accent), #00b894);
    color: #000; border: none; padding: 7px 14px; border-radius: 8px;
    font-weight: 700; font-size: .78rem; cursor: pointer;
    font-family: var(--font-body); white-space: nowrap; transition: opacity .2s;
  }
  .btn-activate:hover { opacity: .85; }
  .btn-activate:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-deactivate {
    background: transparent; border: 1px solid rgba(255,71,87,.3); color: var(--danger);
    padding: 7px 14px; border-radius: 8px; font-weight: 600; font-size: .78rem;
    cursor: pointer; font-family: var(--font-body); white-space: nowrap; transition: all .2s;
  }
  .btn-deactivate:hover { background: rgba(255,71,87,.1); }

  /* Edit balance */
  .btn-edit-bal {
    background: transparent; border: 1px solid rgba(245,200,66,.3); color: var(--gold);
    padding: 5px 10px; border-radius: 7px; font-size: .75rem;
    cursor: pointer; font-family: var(--font-body); transition: all .2s;
  }
  .btn-edit-bal:hover { background: rgba(245,200,66,.1); }

  /* Delete user */
  .btn-delete {
    background: transparent; border: 1px solid rgba(255,71,87,.2); color: var(--danger);
    padding: 5px 10px; border-radius: 7px; font-size: .75rem;
    cursor: pointer; font-family: var(--font-body); transition: all .2s;
  }
  .btn-delete:hover { background: rgba(255,71,87,.15); }

  @media (max-width: 768px) {
    .table-header { display: none; }
    .user-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 8px; padding: 16px;
    }
    .user-row > div:nth-child(1) { grid-column: 1/-1; }
  }

  .toast-container {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 300;
  }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: .88rem;
    max-width: 320px; box-shadow: 0 8px 30px rgba(0,0,0,.4);
    animation: toastIn .3s ease;
  }
  .toast.success { border-color: rgba(0,212,170,.4); }
  .toast.error   { border-color: rgba(255,71,87,.4); }
  .toast.warn    { border-color: rgba(245,200,66,.4); }
  @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform:none; } }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: .9rem; }

  .search-bar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; color: var(--text);
    font-size: .9rem; font-family: var(--font-body); width: 100%; max-width: 320px;
    margin-bottom: 16px;
  }
  .search-bar:focus { outline: none; border-color: var(--accent2); }

  .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 20px; border-radius: 30px; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: all .2s; border: 1px solid var(--border); color: var(--muted);
    background: transparent;
  }
  .tab.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Loading admin panel...</p>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN GATE -->
<div class="gate" id="gate" style="display:none;">
  <div class="gate-box">
    <div class="gate-logo">eWorldCart</div>
    <div class="gate-sub">⚙️ Administrator Access Only</div>
    <div class="err" id="gateErr"></div>
    <div class="form-group">
      <label>Admin Username</label>
      <input type="text" id="adminUser" placeholder="admin" />
    </div>
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()" />
    </div>
    <button class="btn-admin-login" id="loginBtn" onclick="adminLogin()">Access Admin Panel</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <nav>
    <div class="logo">eWorldCart Admin <span>Control Center</span></div>
    <div class="nav-right">
      <span style="font-size:.8rem;color:var(--muted);"><span class="live-dot"></span>Live · Auto-refreshing</span>
      <button class="btn-logout-admin" onclick="adminLogout()">Logout</button>
    </div>
  </nav>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <label>Total Users</label>
        <div class="big gold" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <label>Pending Activation</label>
        <div class="big orange" id="statPending">0</div>
      </div>
      <div class="stat-card">
        <label>Active Traders</label>
        <div class="big green" id="statActive">0</div>
      </div>
      <div class="stat-card">
        <label>Total Balance Issued</label>
        <div class="big gold" id="statIssued">$0</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending', this)">⏳ Pending Activation</button>
      <button class="tab" onclick="switchTab('active', this)">✅ Active Users</button>
      <button class="tab" onclick="switchTab('all', this)">👥 All Users</button>
    </div>

    <!-- Search -->
    <input class="search-bar" id="searchBar" placeholder="Search by name or phone..." oninput="renderUsers()" />

    <!-- Table -->
    <div class="section-title"><div class="dot"></div><span id="tableTitle">Users Awaiting Activation</span></div>
    <div class="table-wrap" id="tableWrap">
      <div class="table-header">
        <div>Name</div>
        <div>Phone</div>
        <div>Status</div>
        <div>Balance</div>
        <div>Buys Today</div>
        <div>Sells Today</div>
        <div>Action</div>
      </div>
      <div id="userList"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, update, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── Firebase Config ──
  const firebaseConfig = {
    apiKey: "AIzaSyD-N4xxeqzJ-bBsYV8tlJXwNLBFS26AkKY",
    authDomain: "eworldcart-81cc1.firebaseapp.com",
    databaseURL: "https://eworldcart-81cc1-default-rtdb.firebaseio.com",
    projectId: "eworldcart-81cc1",
    storageBucket: "eworldcart-81cc1.firebasestorage.app",
    messagingSenderId: "570790822977",
    appId: "1:570790822977:web:8ad58400d4202b21b272c0",
    measurementId: "G-VJGBW5T6RY"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── Admin Credentials (change these!) ──
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'ewc@admin2024';

  let allUsersCache = {};
  let currentTab    = 'pending';
  let usersListener = null;

  function phoneKey(phone) {
    return phone.replace(/[.#$[\]]/g, '_');
  }

  // ── Auth ──
  window.adminLogin = async function() {
    const u   = document.getElementById('adminUser').value.trim();
    const p   = document.getElementById('adminPass').value;
    const err = document.getElementById('gateErr');
    const btn = document.getElementById('loginBtn');
    err.classList.remove('show');

    if (u !== ADMIN_USER || p !== ADMIN_PASS) {
      err.textContent = 'Invalid credentials. Access denied.';
      err.classList.add('show');
      return;
    }

    btn.disabled = true; btn.textContent = 'Connecting...';
    document.getElementById('gate').style.display      = 'none';
    document.getElementById('adminWrap').classList.add('visible');

    // Subscribe to real-time updates
    usersListener = onValue(ref(db, 'users'), snap => {
      allUsersCache = snap.exists() ? snap.val() : {};
      renderStats();
      renderUsers();
    });

    btn.disabled = false; btn.textContent = 'Access Admin Panel';
  };

  window.adminLogout = function() {
    if (usersListener) { usersListener(); usersListener = null; }
    allUsersCache = {};
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('adminWrap').classList.remove('visible');
    document.getElementById('adminUser').value = '';
    document.getElementById('adminPass').value = '';
  };

  // ── Tabs ──
  window.switchTab = function(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const titles = { pending: 'Users Awaiting Activation', active: 'Active Traders', all: 'All Registered Users' };
    document.getElementById('tableTitle').textContent = titles[tab];
    renderUsers();
  };

  // ── Render Stats ──
  function renderStats() {
    const arr     = Object.values(allUsersCache);
    const pending = arr.filter(u => u.status === 'pending').length;
    const active  = arr.filter(u => u.status === 'active').length;
    const issued  = arr.reduce((s, u) => s + (u.startAmount || 0), 0);
    document.getElementById('statTotal').textContent   = arr.length;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statActive').textContent  = active;
    document.getElementById('statIssued').textContent  = '$' + issued.toFixed(2);
  }

  // ── Render Users ──
  function renderUsers() {
    const search = document.getElementById('searchBar').value.toLowerCase();
    let arr = Object.values(allUsersCache);

    if (currentTab === 'pending') arr = arr.filter(u => u.status === 'pending');
    if (currentTab === 'active')  arr = arr.filter(u => u.status === 'active');
    if (search) arr = arr.filter(u =>
      (u.name || '').toLowerCase().includes(search) ||
      (u.phone || '').includes(search)
    );

    arr.sort((a, b) => b.createdAt - a.createdAt);

    const list = document.getElementById('userList');
    if (arr.length === 0) {
      list.innerHTML = '<div class="empty-state">No users found in this category.</div>';
      return;
    }

    list.innerHTML = arr.map(user => {
      const joinDate  = new Date(user.createdAt).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      const profit    = parseFloat(((user.balance || 0) - (user.startAmount || 0)).toFixed(2));
      const isPending = user.status === 'pending';
      const safePhone = escAttr(user.phone);
      const safeName  = escHtml(user.name);

      return `
        <div class="user-row">
          <div>
            <div class="user-name">${safeName}</div>
            <div style="font-size:.72rem;color:var(--muted);">Joined: ${joinDate}</div>
          </div>
          <div class="user-phone">${escHtml(user.phone)}</div>
          <div><span class="badge ${user.status}">${user.status}</span></div>
          <div>
            <div class="balance-cell">$${(user.balance || 0).toFixed(2)}</div>
            ${!isPending ? `<div style="font-size:.7rem;color:${profit >= 0 ? 'var(--accent)' : 'var(--danger)'}">P&L: ${profit >= 0 ? '+' : ''}$${Math.abs(profit).toFixed(2)}</div>` : ''}
            ${!isPending ? `<button class="btn-edit-bal" onclick="editBalance('${safePhone}')">✏️ Edit</button>` : ''}
          </div>
          <div style="font-size:.88rem;">${user.buyToday || 0}/5</div>
          <div style="font-size:.88rem;">${user.sellToday || 0}/5</div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            ${isPending ? `
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <select class="amount-select" id="amt_${safePhone}">
                  <option value="15">$15</option>
                  <option value="20">$20</option>
                  <option value="35">$35</option>
                  <option value="55">$55</option>
                  <option value="100">$100</option>
                </select>
                <input class="custom-amount" type="number" id="custom_${safePhone}" placeholder="Custom $" min="1" step="0.01" />
                <button class="btn-activate" onclick="activateUser('${safePhone}')">✅ Activate</button>
              </div>
            ` : `
              <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                <div style="font-size:.72rem;color:var(--muted);">Start: $${(user.startAmount || 0).toFixed(2)}</div>
                <button class="btn-deactivate" onclick="deactivateUser('${safePhone}')">Deactivate</button>
              </div>
            `}
            <button class="btn-delete" onclick="deleteUser('${safePhone}')">🗑 Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  // Make renderUsers accessible for oninput
  window.renderUsers = renderUsers;

  // ── Actions ──
  window.activateUser = async function(phone) {
    const key   = phoneKey(phone);
    // find the real phone key in cache
    const user  = Object.values(allUsersCache).find(u => phoneKey(u.phone) === key || u.phone === phone);
    if (!user) return;

    const selectEl = document.getElementById('amt_' + phone);
    const customEl = document.getElementById('custom_' + phone);
    let amount     = parseFloat(customEl && customEl.value ? customEl.value : (selectEl ? selectEl.value : 15));
    if (isNaN(amount) || amount <= 0) amount = 15;

    try {
      await update(ref(db, 'users/' + phoneKey(user.phone)), {
        status: 'active',
        balance: amount,
        startAmount: amount
      });
      toast('success', '✅ ' + user.name + ' activated with $' + amount.toFixed(2) + ' starting balance.');
    } catch (e) {
      toast('error', 'Failed: ' + e.message);
    }
  };

  window.deactivateUser = async function(phone) {
    const user = Object.values(allUsersCache).find(u => phoneKey(u.phone) === phone || u.phone === phone);
    if (!user) return;
    if (!confirm('Deactivate ' + user.name + '? They will lose marketplace access.')) return;
    try {
      await update(ref(db, 'users/' + phoneKey(user.phone)), { status: 'pending' });
      toast('warn', '⚠️ ' + user.name + ' has been deactivated.');
    } catch (e) {
      toast('error', 'Failed: ' + e.message);
    }
  };

  window.deleteUser = async function(phone) {
    const user = Object.values(allUsersCache).find(u => phoneKey(u.phone) === phone || u.phone === phone);
    if (!user) return;
    if (!confirm('Permanently DELETE ' + user.name + '? This cannot be undone!')) return;
    try {
      await remove(ref(db, 'users/' + phoneKey(user.phone)));
      toast('error', '🗑 ' + user.name + ' deleted permanently.');
    } catch (e) {
      toast('error', 'Failed: ' + e.message);
    }
  };

  window.editBalance = async function(phone) {
    const user = Object.values(allUsersCache).find(u => phoneKey(u.phone) === phone || u.phone === phone);
    if (!user) return;
    const newBal = prompt('Enter new balance for ' + user.name + ' (current: $' + (user.balance || 0).toFixed(2) + '):', (user.balance || 0).toFixed(2));
    if (newBal === null) return;
    const amount = parseFloat(newBal);
    if (isNaN(amount) || amount < 0) { toast('error', 'Invalid amount.'); return; }
    try {
      await update(ref(db, 'users/' + phoneKey(user.phone)), { balance: amount });
      toast('success', '✅ Balance updated to $' + amount.toFixed(2) + ' for ' + user.name);
    } catch (e) {
      toast('error', 'Failed: ' + e.message);
    }
  };

  // ── Toast ──
  function toast(type, msg) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 4500);
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escAttr(str) {
    return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // ── Init ──
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('gate').style.display           = 'flex';
</script>
</body>
</html>
